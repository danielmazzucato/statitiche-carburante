[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_pgsql", "php83Extensions.pgsql", "php83Extensions.mbstring", "php83Extensions.fileinfo", "php83Extensions.session", "php83Extensions.curl"]

[phases.install]
cmds = ["mkdir -p /app/uploads", "chmod 777 /app/uploads"]

[start]
cmd = "php -S 0.0.0.0:${PORT:-8080} -t /app"
